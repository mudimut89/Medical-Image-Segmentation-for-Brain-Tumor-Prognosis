version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brain-tumor-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/brain_tumor
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - brain-tumor-network

  # Frontend Service
  frontend:
    build:
      context: ./objective3_interface/frontend
      dockerfile: Dockerfile
    container_name: brain-tumor-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - brain-tumor-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: brain-tumor-db
    environment:
      - POSTGRES_DB=brain_tumor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - brain-tumor-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: brain-tumor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - brain-tumor-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: brain-tumor-nginx
    ports:
      - "443:443"
      - "5173:5173"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - brain-tumor-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  brain-tumor-network:
    driver: bridge
